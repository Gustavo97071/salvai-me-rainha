<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Copiar Código PIX - Mãe Santíssima</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f7f9fa;
            color: #061930;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            box-sizing: border-box;
        }
        .card {
            background-color: #ffffff;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(6, 25, 48, 0.08);
            border: 1px solid #e2e8f0;
            width: 100%;
            max-width: 450px;
            padding: 40px 30px;
            text-align: center;
            box-sizing: border-box;
        }
        .header {
            margin-bottom: 25px;
        }
        .header h1 {
            font-size: 20px;
            font-weight: 800;
            margin: 0;
            letter-spacing: 0.5px;
        }
        .logo-divider {
            color: #d4af37;
            font-size: 18px;
            margin-top: 5px;
        }
        .status-icon {
            width: 70px;
            height: 70px;
            background-color: #f0fdf4;
            color: #16a34a;
            border-radius: 50%;
            display: inline-flex;
            justify-content: center;
            align-items: center;
            font-size: 32px;
            margin-bottom: 20px;
            border: 2px solid #bbf7d0;
        }
        .title {
            font-size: 22px;
            font-weight: 800;
            margin: 0 0 10px 0;
        }
        .subtitle {
            font-size: 14px;
            color: #475569;
            line-height: 1.5;
            margin: 0 0 25px 0;
        }
        .btn-copy {
            background-color: #061930;
            color: #ffffff;
            border: none;
            border-radius: 8px;
            padding: 14px 24px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            width: 100%;
            box-shadow: 0 4px 12px rgba(6, 25, 48, 0.15);
            transition: background-color 0.2s, transform 0.1s;
        }
        .btn-copy:hover {
            background-color: #0c2b52;
        }
        .btn-copy:active {
            transform: scale(0.98);
        }
        .footer-note {
            font-size: 12px;
            color: #94a3b8;
            margin-top: 30px;
            line-height: 1.4;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="header">
            <h1>MÃE SANTÍSSIMA</h1>
            <div class="logo-divider">💛</div>
        </div>
        
        <div class="status-icon" id="status-icon">✓</div>
        
        <h2 class="title" id="status-title">PIX Copiado!</h2>
        <p class="subtitle" id="status-desc">O código PIX foi copiado automaticamente para a sua área de transferência. Agora, abra o aplicativo do seu banco e pague na opção <strong>Pix Copia e Cola</strong>.</p>
        
        <button class="btn-copy" onclick="copyPixCode()">Copiar Código Novamente</button>
        
        <p class="footer-note">Sua contribuição ajuda a levar fé, esperança e amor a mais pessoas.<br><strong>Deus abençoe você e sua família! 💛</strong></p>
    </div>

    <script>
        let pixCode = "";

        // Parse query params
        function getQueryParams() {
            const params = {};
            const search = window.location.search;
            if (search) {
                const pairs = search.substring(1).split('&');
                for (let i = 0; i < pairs.length; i++) {
                    const pair = pairs[i].split('=');
                    params[decodeURIComponent(pair[0])] = decodeURIComponent(pair[1] || '');
                }
            }
            return params;
        }

        const params = getQueryParams();
        pixCode = params.code || "";

        // Try automatic copy
        function copyPixCode() {
            if (pixCode) {
                navigator.clipboard.writeText(pixCode).then(() => {
                    const title = document.getElementById("status-title");
                    const icon = document.getElementById("status-icon");
                    title.innerText = "PIX Copiado!";
                    icon.style.backgroundColor = "#f0fdf4";
                    icon.style.color = "#16a34a";
                    icon.style.borderColor = "#bbf7d0";
                    icon.innerText = "✓";
                }).catch((err) => {
                    console.error("Failed to copy automatically:", err);
                    const title = document.getElementById("status-title");
                    title.innerText = "Clique para Copiar";
                });
            }
        }

        // Run copy on load
        window.addEventListener('DOMContentLoaded', () => {
            if (pixCode) {
                copyPixCode();
            } else {
                document.getElementById("status-title").innerText = "Código não encontrado";
                document.getElementById("status-desc").innerText = "Por favor, utilize o link direto enviado em seu e-mail.";
                document.getElementById("status-icon").innerText = "✕";
                document.getElementById("status-icon").style.backgroundColor = "#fef2f2";
                document.getElementById("status-icon").style.color = "#ef4444";
                document.getElementById("status-icon").style.borderColor = "#fca5a5";
            }
        });
    </script>
</body>
</html>
